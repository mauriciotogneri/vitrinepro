<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Dossier — VitrinePro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="marked.min.js"></script>
    <style>
        :root {
            --navy: #0f1b2d;
            --navy2: #162236;
            --gold: #c9a84c;
            --gold2: #e8c97a;
            --cream: #faf7f2;
            --body: #cbc7bd;
            --gray: #94a0b3;
            --border: rgba(201, 168, 76, 0.2);
            --hair: rgba(201, 168, 76, 0.14);
            --serif: "DM Serif Display", Georgia, serif;
            --sans: "Inter", system-ui, sans-serif;
            --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--sans);
            color: var(--body);
            background:
                radial-gradient(70% 45% at 50% -6%, rgba(201, 168, 76, 0.09), transparent 60%),
                var(--navy);
            background-repeat: no-repeat;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Top bar (matches index header) --- */
        .top {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 0.85rem 2.5rem;
            background: rgba(15, 27, 45, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            font-family: var(--serif);
            font-size: 1.5rem;
            letter-spacing: 0.01em;
            color: var(--cream);
            text-decoration: none;
        }

        .brand span {
            color: var(--gold);
        }

        /* --- Reading column --- */
        .wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2.6rem 1.5rem 5rem;
        }

        .eyebrow {
            margin: 0 0 1.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .eyebrow:empty {
            display: none;
        }

        #status {
            padding: 1.5rem 0;
            color: var(--gray);
            font-size: 0.95rem;
        }

        #status.err h1 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: 1.7rem;
            margin: 0 0 0.6rem;
        }

        #status.err p {
            margin: 0 0 1.3rem;
            max-width: 52ch;
            line-height: 1.6;
        }

        #status.err .err-link {
            display: inline-block;
            margin: 0 1.2rem 0 0;
            color: var(--gold2);
            text-decoration: none;
            font-weight: 600;
        }

        #status.err .err-link:hover {
            text-decoration: underline;
        }

        /* --- Rendered markdown --- */
        .md {
            line-height: 1.7;
            font-size: 1rem;
        }

        .md>*:first-child {
            margin-top: 0;
        }

        .md h1 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: clamp(1.9rem, 4vw, 2.4rem);
            line-height: 1.1;
            margin: 0 0 0.7rem;
        }

        .md h2 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: 1.5rem;
            margin: 2.4rem 0 0.9rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--hair);
        }

        .md h3 {
            color: var(--gold2);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.7rem 0 0.6rem;
        }

        .md h4,
        .md h5,
        .md h6 {
            color: var(--cream);
            font-size: 0.98rem;
            font-weight: 600;
            margin: 1.3rem 0 0.5rem;
        }

        .md p {
            margin: 0.8rem 0;
        }

        .md a {
            color: var(--gold2);
            text-decoration: underline;
            text-underline-offset: 2px;
            word-break: break-word;
        }

        .md a:hover {
            color: var(--gold);
        }

        .md strong {
            color: var(--cream);
            font-weight: 700;
        }

        .md ul,
        .md ol {
            margin: 0.7rem 0;
            padding-left: 1.35rem;
        }

        .md li {
            margin: 0.32rem 0;
        }

        .md li::marker {
            color: var(--gold);
        }

        .md code {
            font-family: var(--mono);
            font-size: 0.85em;
            background: var(--navy2);
            color: var(--gold2);
            padding: 0.12em 0.4em;
            border: 1px solid var(--hair);
            border-radius: 4px;
            word-break: break-word;
        }

        /* Color swatch shown before a hex value (e.g. ▪ #1f1b18) */
        .md .swatch {
            display: inline-block;
            width: 0.8em;
            height: 0.8em;
            margin-right: 0.4em;
            vertical-align: -0.1em;
            border-radius: 3px;
            border: 1px solid rgba(201, 168, 76, 0.35);
        }

        .md pre {
            background: var(--navy2);
            border: 1px solid var(--hair);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
        }

        .md pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--body);
        }

        .md blockquote {
            margin: 1rem 0;
            padding: 0.2rem 0 0.2rem 1rem;
            border-left: 3px solid var(--gold);
            color: var(--gray);
            font-style: italic;
        }

        .md blockquote p {
            margin: 0.4rem 0;
        }

        .md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.2rem 0;
        }

        .md table {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            border-collapse: collapse;
            margin: 1.2rem 0;
            font-size: 0.9rem;
        }

        .md th,
        .md td {
            border: 1px solid var(--hair);
            padding: 0.5rem 0.7rem;
            text-align: left;
            vertical-align: top;
        }

        .md th {
            background: var(--navy2);
            color: var(--cream);
            font-weight: 600;
            white-space: nowrap;
        }

        .md tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .md img {
            max-width: 100%;
            border-radius: 8px;
        }

        /* --- Photo carousel (local assets) --- */
        .carousel {
            margin: 1.5rem 0 0.5rem;
        }

        .carousel-stage {
            position: relative;
            aspect-ratio: 3 / 2;
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .carousel-stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0;
            display: block;
        }

        /* Cream panel keeps vector/dark logos visible against the navy stage */
        .carousel-stage.is-logo {
            background: var(--cream);
        }

        .carousel-msg {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }

        .carousel-stage.is-error .carousel-msg {
            display: flex;
        }

        .carousel-stage.is-error img {
            visibility: hidden;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 2.6rem;
            height: 2.6rem;
            display: grid;
            place-items: center;
            padding: 0;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(15, 27, 45, 0.72);
            backdrop-filter: blur(4px);
            color: var(--gold2);
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .carousel-nav:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--navy);
        }

        .carousel-nav.prev {
            left: 0.7rem;
        }

        .carousel-nav.next {
            right: 0.7rem;
        }

        .carousel-name,
        .carousel-counter {
            position: absolute;
            bottom: 0.7rem;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            background: rgba(15, 27, 45, 0.72);
            border: 1px solid var(--border);
            backdrop-filter: blur(4px);
            font-family: var(--mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--gold2);
        }

        .carousel-name {
            left: 0.7rem;
            max-width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .carousel-counter {
            right: 0.7rem;
        }

        .carousel-thumbs {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
            padding-bottom: 0.3rem;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .carousel-thumbs::-webkit-scrollbar {
            height: 6px;
        }

        .carousel-thumbs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 999px;
        }

        .carousel-thumb {
            flex: 0 0 auto;
            width: 78px;
            height: 56px;
            padding: 0;
            border: 1px solid transparent;
            border-radius: 6px;
            overflow: hidden;
            background: var(--navy2);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s ease, border-color 0.2s ease;
        }

        .carousel-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            display: block;
        }

        .carousel-thumb.is-logo img {
            object-fit: contain;
            background: var(--cream);
        }

        .carousel-thumb:hover {
            opacity: 0.85;
        }

        .carousel-thumb.active {
            opacity: 1;
            border-color: var(--gold);
        }

        .carousel:focus-visible,
        .carousel-nav:focus-visible,
        .carousel-thumb:focus-visible {
            outline: 2px solid var(--gold2);
            outline-offset: 2px;
        }

        a:focus-visible {
            outline: 2px solid var(--gold2);
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (max-width: 620px) {
            .top {
                padding: 0.8rem 1.4rem;
            }

            .wrap {
                padding: 1.8rem 1.3rem 4rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <header class="top">
        <div class="bar">
            <a class="brand" href="./">Vitrine<span>Pro</span></a>
        </div>
    </header>

    <main class="wrap">
        <p class="eyebrow" id="eyebrow"></p>
        <article class="md" id="content" hidden></article>
        <div id="status">Loading dossier…</div>
    </main>

    <script>
        (function () {
            var REPO = "mauriciotogneri/vitrinepro", BRANCH = "main";
            var RAW = "https://raw.githubusercontent.com/" + REPO + "/" + BRANCH + "/data";
            var BLOB = "https://github.com/" + REPO + "/blob/" + BRANCH + "/data";

            // Allow-list: validates the slug and supplies the page title/trade.
            var SHOPS = {
                "cafe-le-bout-de-la-rue_bar": { name: "Café Le Bout de la Rue", trade: "Bar" },
                "miro-barber-shop_barber-shop": { name: "Miro Barber Shop", trade: "Barbershop" },
                "le-mexicain_restaurant": { name: "Le Mexicain", trade: "Restaurant" },
                "gase-jean-robert_tailor": { name: "Jean-Robert Gase", trade: "Tailor" },
                "fleur-d-oranger_second-hand-shop": { name: "Fleur d'Oranger", trade: "Second-hand shop" },
                "toutou-club_pet-groomer": { name: "Toutou-Club", trade: "Pet groomer" },
                "il-colosseo_restaurant": { name: "Il Colosseo", trade: "Restaurant" },
                "le-panape-de-camela_home-goods-store": { name: "Le Panapé de Caméla", trade: "Home goods" },
                "les-fleurs-de-frida_home-goods-store": { name: "Les Fleurs de Frida", trade: "Home goods" },
                "le-the_restaurant": { name: "Le Thé", trade: "Restaurant" },
                "cafe-chez-martins_cafe": { name: "Café Chez Martins", trade: "Café" },
                "yummy-coffee_coffee-shop": { name: "Yummy Coffee", trade: "Coffee shop" },
                "coiffure-illusion_hair-salon": { name: "Coiffure Illusion", trade: "Hair salon" },
                "la-casa-del-sandwich_sandwich-shop": { name: "La Casa Del Sandwich", trade: "Sandwich shop" },
                "bioboulevard_deli": { name: "BioBoulevard", trade: "Deli" },
                "boulangerie-dubois_coffee-shop": { name: "Boulangerie Dubois", trade: "Coffee shop" },
                "cafe-metis_cafe": { name: "Café Metis", trade: "Café" },
                "empanadas-republic_coffee-shop": { name: "Empanadas Republic", trade: "Coffee shop" },
                "gyros_restaurant": { name: "GYROS", trade: "Restaurant" },
                "sabrina-coiffure_hair-salon": { name: "Sabrina Coiffure", trade: "Hair salon" },
                "chez-teresa_bakery": { name: "Chez Teresa", trade: "Bakery" },
                "vetcity_veterinary-care": { name: "VetCity", trade: "Veterinary care" },
                "cerceda_coffee-shop": { name: "Cerceda", trade: "Coffee shop" },
                "cafe-restaurant-de-la-radio_restaurant": { name: "Café Restaurant de la Radio", trade: "Restaurant" },
                "celine-et-sebastien_bakery": { name: "Céline et Sébastien", trade: "Bakery" },
                "chez-marino_restaurant": { name: "Chez Marino", trade: "Restaurant" },
                "dragon_restaurant": { name: "Dragon", trade: "Restaurant" }
            };

            var eyebrow = document.getElementById("eyebrow");
            var content = document.getElementById("content");
            var status = document.getElementById("status");

            function showError(title, detail, blobUrl) {
                eyebrow.hidden = true;
                content.hidden = true;
                status.hidden = false;
                status.className = "err";
                status.textContent = "";
                var h = document.createElement("h1"); h.textContent = title;
                var p = document.createElement("p"); p.textContent = detail;
                status.appendChild(h);
                status.appendChild(p);
                if (blobUrl) {
                    var a = document.createElement("a");
                    a.href = blobUrl; a.target = "_blank"; a.rel = "noopener";
                    a.className = "err-link"; a.textContent = "Open it on GitHub ↗";
                    status.appendChild(a);
                }
                var back = document.createElement("a");
                back.href = "./"; back.className = "err-link";
                back.textContent = "← Back to storefronts";
                status.appendChild(back);
            }

            // Build a carousel of the downloaded asset images (logo + photos) by
            // reading the `assets/…` paths the dossier markdown already lists — these
            // match the files on disk 1:1, so no directory listing is needed.
            function buildCarousel(mdText, base, name) {
                var re = /assets\/[A-Za-z0-9._-]+\.(?:jpe?g|png|webp|gif|avif|svg)/gi;
                var seen = {}, paths = [], m;
                while ((m = re.exec(mdText))) {
                    if (!seen[m[0]]) { seen[m[0]] = 1; paths.push(m[0]); }
                }
                if (!paths.length) return null;

                var isLogo = function (p) { return /(^|\/)logo\.[a-z0-9]+$/i.test(p); };
                var width = String(paths.length).length;
                var pad = function (n) { var s = String(n); while (s.length < width) s = "0" + s; return s; };

                var root = document.createElement("section");
                root.className = "carousel";
                root.tabIndex = 0;
                root.setAttribute("role", "group");
                root.setAttribute("aria-roledescription", "carousel");
                root.setAttribute("aria-label", name + " — downloaded images");

                var stage = document.createElement("div");
                stage.className = "carousel-stage";

                var img = document.createElement("img");
                img.decoding = "async";
                img.onerror = function () { stage.classList.add("is-error"); };

                var msg = document.createElement("div");
                msg.className = "carousel-msg";
                msg.textContent = "Image unavailable";

                var nameTag = document.createElement("div");
                nameTag.className = "carousel-name";

                var counter = document.createElement("div");
                counter.className = "carousel-counter";
                counter.setAttribute("aria-live", "polite");

                var prev = document.createElement("button");
                prev.type = "button";
                prev.className = "carousel-nav prev";
                prev.setAttribute("aria-label", "Previous image");
                prev.textContent = "‹";

                var next = document.createElement("button");
                next.type = "button";
                next.className = "carousel-nav next";
                next.setAttribute("aria-label", "Next image");
                next.textContent = "›";

                stage.appendChild(img);
                stage.appendChild(msg);
                stage.appendChild(nameTag);
                stage.appendChild(counter);
                stage.appendChild(prev);
                stage.appendChild(next);
                root.appendChild(stage);

                var thumbs = document.createElement("div");
                thumbs.className = "carousel-thumbs";
                var thumbEls = paths.map(function (p, i) {
                    var b = document.createElement("button");
                    b.type = "button";
                    b.className = "carousel-thumb" + (isLogo(p) ? " is-logo" : "");
                    b.setAttribute("aria-label", "Show image " + (i + 1) + " of " + paths.length);
                    var t = document.createElement("img");
                    t.src = base + p;
                    t.alt = "";
                    t.loading = "lazy";
                    t.decoding = "async";
                    t.onerror = function () { this.style.visibility = "hidden"; };
                    b.appendChild(t);
                    b.addEventListener("click", function () { show(i); });
                    thumbs.appendChild(b);
                    return b;
                });
                root.appendChild(thumbs);

                var cur = -1;
                function centerThumb(el) {
                    if (!thumbs.isConnected) return; // skip while still detached (avoids page jump on load)
                    var cr = thumbs.getBoundingClientRect();
                    var er = el.getBoundingClientRect();
                    thumbs.scrollLeft += (er.left + er.width / 2) - (cr.left + cr.width / 2);
                }
                function show(i) {
                    cur = (i + paths.length) % paths.length;
                    var p = paths[cur], logo = isLogo(p);
                    stage.classList.remove("is-error");
                    stage.classList.toggle("is-logo", logo);
                    img.src = base + p;
                    img.alt = logo ? (name + " logo") : (name + " photo " + (cur + 1));
                    nameTag.textContent = p.split("/").pop();
                    counter.textContent = pad(cur + 1) + " / " + paths.length;
                    thumbEls.forEach(function (el, j) {
                        var on = j === cur;
                        el.classList.toggle("active", on);
                        if (on) { el.setAttribute("aria-current", "true"); }
                        else { el.removeAttribute("aria-current"); }
                    });
                    centerThumb(thumbEls[cur]);
                }

                prev.addEventListener("click", function () { show(cur - 1); });
                next.addEventListener("click", function () { show(cur + 1); });
                root.addEventListener("keydown", function (e) {
                    if (e.key === "ArrowLeft") { e.preventDefault(); show(cur - 1); }
                    else if (e.key === "ArrowRight") { e.preventDefault(); show(cur + 1); }
                });

                if (paths.length === 1) { // a single image needs no nav, counter, or strip
                    prev.style.display = "none";
                    next.style.display = "none";
                    counter.style.display = "none";
                    thumbs.style.display = "none";
                }

                show(0);
                return root;
            }

            var slug = new URLSearchParams(location.search).get("slug") || "";
            var shop = Object.prototype.hasOwnProperty.call(SHOPS, slug) ? SHOPS[slug] : null;

            if (!shop) {
                document.title = "Not found — VitrinePro";
                showError("Dossier not found",
                    slug ? ("No business matches “" + slug + "”.") : "No business was specified.",
                    null);
                return;
            }

            var blobUrl = BLOB + "/" + slug + "/" + slug + ".md";
            document.title = shop.name + " — VitrinePro";
            eyebrow.textContent = shop.trade + " · Geneva";

            if (typeof window.marked === "undefined") {
                showError("Couldn't load the renderer", "The markdown library failed to load. Check your connection and reload.", blobUrl);
                return;
            }

            fetch(RAW + "/" + slug + "/" + slug + ".md")
                .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
                .then(function (md) {
                    window.marked.setOptions({ gfm: true, breaks: false });
                    content.innerHTML = window.marked.parse(md);
                    content.querySelectorAll('a[href^="http"]').forEach(function (a) {
                        a.target = "_blank"; a.rel = "noopener";
                    });
                    var HEX = /^#(?:[0-9a-fA-F]{3,4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/;
                    content.querySelectorAll("code").forEach(function (c) {
                        var hex = c.textContent.trim();
                        if (!HEX.test(hex)) return;
                        var sw = document.createElement("span");
                        sw.className = "swatch";
                        sw.style.background = hex;
                        sw.setAttribute("aria-hidden", "true");
                        c.parentNode.insertBefore(sw, c);
                    });
                    var carousel = buildCarousel(md, RAW + "/" + slug + "/", shop.name);
                    if (carousel) {
                        var h2s = content.querySelectorAll("h2"), mediaHead = null;
                        for (var i = 0; i < h2s.length; i++) {
                            if (h2s[i].textContent.trim().toLowerCase() === "media") { mediaHead = h2s[i]; break; }
                        }
                        if (mediaHead) { mediaHead.insertAdjacentElement("afterend", carousel); }
                        else { content.insertBefore(carousel, content.firstChild); }
                    }
                    status.hidden = true;
                    content.hidden = false;
                })
                .catch(function (err) {
                    showError("Couldn't load this dossier",
                        "Fetch failed (" + err.message + "). It may have moved, or the repository is unreachable.",
                        blobUrl);
                });
        })();
    </script>
</body>

</html>
