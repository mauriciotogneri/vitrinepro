<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Dossier — VitrinePro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="marked.min.js"></script>
    <style>
        :root {
            --navy: #0f1b2d;
            --navy2: #162236;
            --gold: #c9a84c;
            --gold2: #e8c97a;
            --cream: #faf7f2;
            --body: #cbc7bd;
            --gray: #94a0b3;
            --border: rgba(201, 168, 76, 0.2);
            --hair: rgba(201, 168, 76, 0.14);
            --serif: "DM Serif Display", Georgia, serif;
            --sans: "Inter", system-ui, sans-serif;
            --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--sans);
            color: var(--body);
            background:
                radial-gradient(70% 45% at 50% -6%, rgba(201, 168, 76, 0.09), transparent 60%),
                var(--navy);
            background-repeat: no-repeat;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Top bar (matches index header) --- */
        .top {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 0.85rem 2.5rem;
            background: rgba(15, 27, 45, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            font-family: var(--serif);
            font-size: 1.5rem;
            letter-spacing: 0.01em;
            color: var(--cream);
            text-decoration: none;
        }

        .brand span {
            color: var(--gold);
        }

        /* --- Reading column --- */
        .wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2.6rem 1.5rem 5rem;
        }

        .eyebrow {
            margin: 0 0 1.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .eyebrow:empty {
            display: none;
        }

        #status {
            padding: 1.5rem 0;
            color: var(--gray);
            font-size: 0.95rem;
        }

        #status.err h1 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: 1.7rem;
            margin: 0 0 0.6rem;
        }

        #status.err p {
            margin: 0 0 1.3rem;
            max-width: 52ch;
            line-height: 1.6;
        }

        #status.err .err-link {
            display: inline-block;
            margin: 0 1.2rem 0 0;
            color: var(--gold2);
            text-decoration: none;
            font-weight: 600;
        }

        #status.err .err-link:hover {
            text-decoration: underline;
        }

        /* --- Rendered markdown --- */
        .md {
            line-height: 1.7;
            font-size: 1rem;
        }

        .md>*:first-child {
            margin-top: 0;
        }

        .md h1 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: clamp(1.9rem, 4vw, 2.4rem);
            line-height: 1.1;
            margin: 0 0 0.7rem;
        }

        .md h2 {
            font-family: var(--serif);
            font-weight: 400;
            color: var(--cream);
            font-size: 1.5rem;
            margin: 2.4rem 0 0.9rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--hair);
        }

        .md h3 {
            color: var(--gold2);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.7rem 0 0.6rem;
        }

        .md h4,
        .md h5,
        .md h6 {
            color: var(--cream);
            font-size: 0.98rem;
            font-weight: 600;
            margin: 1.3rem 0 0.5rem;
        }

        .md p {
            margin: 0.8rem 0;
        }

        .md a {
            color: var(--gold2);
            text-decoration: underline;
            text-underline-offset: 2px;
            word-break: break-word;
        }

        .md a:hover {
            color: var(--gold);
        }

        .md strong {
            color: var(--cream);
            font-weight: 700;
        }

        .md ul,
        .md ol {
            margin: 0.7rem 0;
            padding-left: 1.35rem;
        }

        .md li {
            margin: 0.32rem 0;
        }

        .md li::marker {
            color: var(--gold);
        }

        .md code {
            font-family: var(--mono);
            font-size: 0.85em;
            background: var(--navy2);
            color: var(--gold2);
            padding: 0.12em 0.4em;
            border: 1px solid var(--hair);
            border-radius: 4px;
            word-break: break-word;
        }

        .md pre {
            background: var(--navy2);
            border: 1px solid var(--hair);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
        }

        .md pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--body);
        }

        .md blockquote {
            margin: 1rem 0;
            padding: 0.2rem 0 0.2rem 1rem;
            border-left: 3px solid var(--gold);
            color: var(--gray);
            font-style: italic;
        }

        .md blockquote p {
            margin: 0.4rem 0;
        }

        .md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.2rem 0;
        }

        .md table {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            border-collapse: collapse;
            margin: 1.2rem 0;
            font-size: 0.9rem;
        }

        .md th,
        .md td {
            border: 1px solid var(--hair);
            padding: 0.5rem 0.7rem;
            text-align: left;
            vertical-align: top;
        }

        .md th {
            background: var(--navy2);
            color: var(--cream);
            font-weight: 600;
            white-space: nowrap;
        }

        .md tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .md img {
            max-width: 100%;
            border-radius: 8px;
        }

        a:focus-visible {
            outline: 2px solid var(--gold2);
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (max-width: 620px) {
            .top {
                padding: 0.8rem 1.4rem;
            }

            .wrap {
                padding: 1.8rem 1.3rem 4rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <header class="top">
        <div class="bar">
            <a class="brand" href="./">Vitrine<span>Pro</span></a>
        </div>
    </header>

    <main class="wrap">
        <p class="eyebrow" id="eyebrow"></p>
        <article class="md" id="content" hidden></article>
        <div id="status">Loading dossier…</div>
    </main>

    <script>
        (function () {
            var REPO = "mauriciotogneri/vitrinepro", BRANCH = "main";
            var RAW = "https://raw.githubusercontent.com/" + REPO + "/" + BRANCH + "/data";
            var BLOB = "https://github.com/" + REPO + "/blob/" + BRANCH + "/data";

            // Allow-list: validates the slug and supplies the page title/trade.
            var SHOPS = {
                "miro-barber-shop_barber-shop": { name: "Miro Barber Shop", trade: "Barbershop" },
                "le-mexicain_restaurant": { name: "Le Mexicain", trade: "Restaurant" },
                "gase-jean-robert_tailor": { name: "Jean-Robert Gase", trade: "Tailor" },
                "fleur-d-oranger_second-hand-shop": { name: "Fleur d'Oranger", trade: "Second-hand shop" },
                "toutou-club_pet-groomer": { name: "Toutou-Club", trade: "Pet groomer" },
                "il-colosseo_restaurant": { name: "Il Colosseo", trade: "Restaurant" },
                "le-panape-de-camela_home-goods-store": { name: "Le Panapé de Caméla", trade: "Home goods" },
                "le-the_restaurant": { name: "Le Thé", trade: "Restaurant" },
                "cafe-chez-martins_cafe": { name: "Café Chez Martins", trade: "Café" }
            };

            var eyebrow = document.getElementById("eyebrow");
            var content = document.getElementById("content");
            var status = document.getElementById("status");

            function showError(title, detail, blobUrl) {
                eyebrow.hidden = true;
                content.hidden = true;
                status.hidden = false;
                status.className = "err";
                status.textContent = "";
                var h = document.createElement("h1"); h.textContent = title;
                var p = document.createElement("p"); p.textContent = detail;
                status.appendChild(h);
                status.appendChild(p);
                if (blobUrl) {
                    var a = document.createElement("a");
                    a.href = blobUrl; a.target = "_blank"; a.rel = "noopener";
                    a.className = "err-link"; a.textContent = "Open it on GitHub ↗";
                    status.appendChild(a);
                }
                var back = document.createElement("a");
                back.href = "./"; back.className = "err-link";
                back.textContent = "← Back to storefronts";
                status.appendChild(back);
            }

            var slug = new URLSearchParams(location.search).get("slug") || "";
            var shop = Object.prototype.hasOwnProperty.call(SHOPS, slug) ? SHOPS[slug] : null;

            if (!shop) {
                document.title = "Not found — VitrinePro";
                showError("Dossier not found",
                    slug ? ("No business matches “" + slug + "”.") : "No business was specified.",
                    null);
                return;
            }

            var blobUrl = BLOB + "/" + slug + "/" + slug + ".md";
            document.title = shop.name + " — VitrinePro";
            eyebrow.textContent = shop.trade + " · Geneva";

            if (typeof window.marked === "undefined") {
                showError("Couldn't load the renderer", "The markdown library failed to load. Check your connection and reload.", blobUrl);
                return;
            }

            fetch(RAW + "/" + slug + "/" + slug + ".md")
                .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
                .then(function (md) {
                    window.marked.setOptions({ gfm: true, breaks: false });
                    content.innerHTML = window.marked.parse(md);
                    content.querySelectorAll('a[href^="http"]').forEach(function (a) {
                        a.target = "_blank"; a.rel = "noopener";
                    });
                    status.hidden = true;
                    content.hidden = false;
                })
                .catch(function (err) {
                    showError("Couldn't load this dossier",
                        "Fetch failed (" + err.message + "). It may have moved, or the repository is unreachable.",
                        blobUrl);
                });
        })();
    </script>
</body>

</html>
