<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Map</title>
<meta name="description" content="An interactive Google map of points of interest around Geneva, Switzerland." />
<meta name="theme-color" content="#F6F3EC" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23C81E1E' d='M12 2C8.1 2 5 5.1 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.9-3.1-7-7-7z'/%3E%3Ccircle cx='12' cy='9' r='2.6' fill='%23F6F3EC'/%3E%3C/svg%3E" />

<!-- ============================================================
     GENEVA — POINTS OF INTEREST  (single-file static page)
     ------------------------------------------------------------
     SETUP (everything lives in this one file):
       1. GOOGLE MAPS KEY ... search "YOUR_API_KEY" near the bottom
                             and replace it with your own key.
                             Restrict the key by HTTP referrer to the
                             domain you deploy to (it is public here).
       2. COORDINATES ...... markers are plotted from each POI's
                             "location": { "lat", "lng" } in each assets/<type>.json file.
                             POIs without a numeric location are skipped.
       3. MAP DEFAULT ...... edit GENEVA / DEFAULT_ZOOM in the script.
       4. COLOURS / FONTS .. edit the variables in  :root { … }
     ============================================================ -->

<!-- Bootstrap 5 (reset · grid · utilities) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Bootstrap Icons (pin, star, phone, link) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<!-- Fonts: Archivo (display) · DM Sans (body) · Space Mono (coordinate labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   DESIGN TOKENS — "refined cartographic"
   ========================================================= */
:root{
  --paper:      #F6F3EC;   /* warm paper sidebar            */
  --ink:        #1B1A17;   /* near-black text               */
  --ink-soft:   #6B6557;   /* muted captions                */
  --line:       #DAD3C4;   /* hairlines                     */
  --accent:     #C81E1E;   /* deep Geneva red (markers/CTA) */
  --accent-dk:  #9E1414;   /* hover / pressed               */
  --radius:     12px;
  --font-display: 'Archivo', system-ui, sans-serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'Space Mono', ui-monospace, monospace;
}

*{ box-sizing: border-box; }
html, body{ height: 100%; }
body{
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ---- Layout ---------------------------------------------- */
.app{ overflow: hidden; }            /* vh-100 + flex via Bootstrap utilities */

.sidebar{
  background:
    radial-gradient(circle at 1px 1px, rgba(27,26,23,.05) 1px, transparent 0) 0 0 / 22px 22px,
    var(--paper);
  border-bottom: 1px solid var(--line);
  overflow-y: auto;
}
@media (min-width: 768px){
  .sidebar{
    flex: 0 0 340px;
    width: 340px;
    border-bottom: 0;
    border-right: 1px solid var(--line);
  }
}
.sidebar__inner{
  display: flex;
  flex-direction: column;
  min-height: 100%;
  padding: 1.25rem 1.15rem;
}

.map-wrap{ position: relative; min-height: 300px; }
#map{ position: absolute; inset: 0; background: #E8E4DA; }

/* ---- Sidebar content ------------------------------------- */
.brand{ display: flex; align-items: center; gap: .75rem; }
.brand__pin{
  display: grid; place-items: center;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; font-size: 1.25rem;
  box-shadow: 0 8px 18px -8px rgba(200,30,30,.7);
}
.brand__title{
  font-family: var(--font-display);
  font-weight: 800; font-size: 1.55rem;
  letter-spacing: -.02em; line-height: 1; margin: 0;
}
.brand__sub{
  margin: .15rem 0 0;
  font-size: .82rem; color: var(--ink-soft);
}

.coords{
  margin-top: 1.1rem;
  font-family: var(--font-mono);
  font-size: .72rem; letter-spacing: .03em;
  text-transform: uppercase; color: var(--ink-soft);
}

.rule{ height: 1px; background: var(--line); margin: 1.25rem 0; border: 0; }

.count{ margin: 0 0 .35rem; font-size: .95rem; }
.count strong{ font-weight: 700; }
.hint{ margin: 0 0 1rem; font-size: .82rem; color: var(--ink-soft); }

.btn-show{
  display: inline-flex; align-items: center; justify-content: center; gap: .55rem;
  width: 100%;
  font-family: var(--font-display);
  font-weight: 700; font-size: 1rem; letter-spacing: .01em;
  color: #fff; background: var(--accent);
  border: 0; border-radius: var(--radius);
  padding: .85rem 1rem; cursor: pointer;
  box-shadow: 0 8px 20px -10px rgba(200,30,30,.6);
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.btn-show:hover:not(:disabled){ transform: translateY(-2px); background: var(--accent-dk); box-shadow: 0 14px 26px -12px rgba(200,30,30,.7); }
.btn-show:active:not(:disabled){ transform: translateY(0); }
.btn-show:focus-visible{ outline: 3px solid rgba(200,30,30,.35); outline-offset: 2px; }
.btn-show:disabled{ background: var(--ink-soft); opacity: .55; cursor: default; box-shadow: none; }

.status{ margin: .85rem 0 0; font-size: .82rem; min-height: 1.1em; color: var(--ink-soft); }
.status.is-error{ color: var(--accent-dk); font-weight: 600; }

/* ---- Category filters (accordion) ------------------------ */
.filters{ display: flex; flex-direction: column; gap: .4rem; }
.cat{
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255,255,255,.4);
  overflow: hidden;
}
.cat__head{
  display: flex; align-items: center; justify-content: space-between; gap: .5rem;
  padding: .7rem .85rem; cursor: pointer; list-style: none; user-select: none;
  font-family: var(--font-display); font-weight: 700; font-size: .92rem; color: var(--ink);
}
.cat__head::-webkit-details-marker{ display: none; }
.cat__head:hover{ background: rgba(27,26,23,.035); }
.cat__head:focus-visible{ outline: 3px solid rgba(200,30,30,.3); outline-offset: -3px; }
.cat__chev{ font-size: .8rem; color: var(--ink-soft); transition: transform .2s ease; }
.cat[open] .cat__chev{ transform: rotate(180deg); }
.cat__count{ margin-left: .3rem; font-family: var(--font-mono); font-weight: 400; font-size: .78rem; color: var(--ink-soft); }
.cat__list{
  list-style: none; margin: 0;
  padding: .15rem .85rem .7rem;
  display: flex; flex-direction: column; gap: .05rem;
}
.opt{ display: flex; align-items: center; gap: .55rem; padding: .3rem .1rem; cursor: pointer; font-size: .87rem; }
.opt__cb{ width: 1.05rem; height: 1.05rem; flex: 0 0 auto; accent-color: var(--accent); cursor: pointer; }
.opt__count{ margin-left: .3rem; font-family: var(--font-mono); font-size: .78rem; color: var(--ink-soft); }
.opt:has(.opt__cb:disabled){ opacity: .45; cursor: default; }

/* ---- Checkbox tooltip (raw business type on hover) ------- */
.tip{
  position: fixed; z-index: 9999;
  padding: .22rem .5rem;
  font-family: var(--font-mono); font-size: .68rem; letter-spacing: .02em;
  color: var(--paper); background: var(--ink);
  border-radius: 6px; white-space: nowrap;
  box-shadow: 0 6px 16px -8px rgba(27,26,23,.55);
  pointer-events: none;
  opacity: 0; transform: translateY(2px);
  transition: opacity .12s ease, transform .12s ease;
}
.tip.is-on{ opacity: 1; transform: none; }
.tip::after{
  content: ""; position: absolute; left: var(--caret, 12px);
  width: 8px; height: 8px; background: var(--ink);
  transform: translateX(-50%) rotate(45deg);
}
.tip--above::after{ bottom: -3px; }
.tip--below::after{ top: -3px; }

.foot{ margin-top: auto; padding-top: 1.5rem; font-size: .72rem; color: var(--ink-soft); }
.foot__dot{ display: inline-block; width: .6rem; height: .6rem; border-radius: 50%; background: var(--accent); vertical-align: -1px; margin-right: .3rem; }

/* ---- Staggered load reveal ------------------------------- */
@keyframes rise{ from{ opacity: 0; transform: translateY(8px); } to{ opacity: 1; transform: none; } }
.sidebar__inner > *{ animation: rise .5s both; }
.sidebar__inner > *:nth-child(1){ animation-delay: .04s; }
.sidebar__inner > *:nth-child(2){ animation-delay: .10s; }
.sidebar__inner > *:nth-child(3){ animation-delay: .16s; }
.sidebar__inner > *:nth-child(4){ animation-delay: .22s; }
.sidebar__inner > *:nth-child(5){ animation-delay: .28s; }
.sidebar__inner > *:nth-child(6){ animation-delay: .34s; }

/* ---- Marker info bubble ---------------------------------- */
.poi{ font-family: var(--font-body); color: var(--ink); max-width: 244px; padding: 2px 2px 4px; }
.poi__name{ font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; line-height: 1.15; margin: 0 0 .35rem; }
.poi__rating{ font-size: .9rem; margin-bottom: .25rem; }
.poi__rating strong{ font-weight: 700; }
.poi__star{ color: var(--accent); }
.poi__reviews{ color: var(--ink-soft); }
.poi__cat{ font-family: var(--font-mono); font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); margin-bottom: .55rem; }
.poi__row{ display: flex; gap: .45rem; align-items: flex-start; font-size: .88rem; margin-bottom: .3rem; }
.poi__row i{ color: var(--accent); margin-top: .12rem; flex: 0 0 auto; }
.poi__row a{ color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }
.poi__link{ display: inline-flex; align-items: center; gap: .35rem; margin-top: .45rem; font-weight: 600; font-size: .85rem; color: var(--accent); text-decoration: none; }
.poi__link:hover{ text-decoration: underline; }

/* ---- POI image carousel ---------------------------------- */
.poi__carousel{
  position: relative;
  width: 240px;
  margin: 0 0 .55rem;
  border-radius: 8px;
  overflow: hidden;
  background: var(--line);
}
.poi__track{
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.poi__track::-webkit-scrollbar{ display: none; }
.poi__slide{
  flex: 0 0 100%;
  width: 100%; height: 150px;
  object-fit: cover; display: block;
  scroll-snap-align: center;
}
.poi__nav{
  position: absolute; top: 50%; transform: translateY(-50%);
  display: grid; place-items: center;
  width: 28px; height: 28px;
  border: 0; border-radius: 50%;
  background: rgba(27,26,23,.55); color: #fff;
  cursor: pointer; font-size: .9rem;
  transition: background .15s ease;
}
.poi__nav:hover{ background: rgba(27,26,23,.82); }
.poi__nav:focus-visible{ outline: 2px solid #fff; outline-offset: 1px; }
.poi__nav--prev{ left: 6px; }
.poi__nav--next{ right: 6px; }
.poi__counter{
  position: absolute; right: 6px; bottom: 6px;
  font-family: var(--font-mono); font-size: .62rem; letter-spacing: .02em;
  padding: .1rem .4rem; border-radius: 999px;
  background: rgba(27,26,23,.6); color: #fff;
}

@media (prefers-reduced-motion: reduce){
  .sidebar__inner > *{ animation: none; }
  .cat__chev{ transition: none; }
  .tip{ transform: none; transition: opacity .12s ease; }
}
</style>
</head>

<body>
  <div class="app d-flex flex-column flex-md-row vh-100">

    <!-- ============ LEFT: navigation menu ============ -->
    <aside class="sidebar">
      <div class="sidebar__inner">

        <div class="filters" id="filters"></div>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </aside>

    <!-- ============ RIGHT: Google map ============ -->
    <div class="map-wrap flex-grow-1">
      <div id="map"></div>
    </div>

  </div>

  <!-- ============ APP LOGIC ============ -->
  <script>
  (function () {
    "use strict";

    /* Map defaults (edit to recenter) */
    var GENEVA = { lat: 46.2044, lng: 6.1432 };
    var DEFAULT_ZOOM = 13;

    var map = null, infoWindow = null;
    var mapReady = false;
    var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* One lazily-loaded map layer per business type. item -> { markers, loaded, loading } */
    var layers = {};

    /* Business types grouped by category (mirrors resources/businesses.txt). */
    var CATEGORIES = [
      { name: "Beauty & Grooming",  items: ["hair_salon","hair_care","barber_shop","beauty_salon","nail_salon","beautician","makeup_artist","body_art_service","tanning_studio","foot_care"] },
      { name: "Wellness & Fitness", items: ["massage","spa","gym","fitness_center","yoga_studio"] },
      { name: "Drink",              items: ["bar","pub","brewery","brewpub","gastropub","beer_garden","cocktail_bar","wine_bar","sports_bar","lounge_bar","hookah_bar","night_club","winery","coffee_shop","coffee_stand","coffee_roastery","tea_house","juice_shop"] },
      { name: "Food",               items: ["restaurant","cafe","bistro","diner","deli","food_court","cafeteria","steak_house","snack_bar","kebab_shop","sandwich_shop","noodle_shop","salad_shop","meal_takeaway","meal_delivery","pizza_delivery","bakery","pastry_shop","cake_shop","donut_shop","bagel_shop","dessert_shop","ice_cream_shop","chocolate_shop","confectionery","acai_shop","butcher_shop"] },
      { name: "Auto Repair",        items: ["car_repair","car_wash","car_dealer","car_rental","tire_shop","bicycle_store","auto_parts_store","ebike_charging_station"] },
      { name: "Pet Care",           items: ["veterinary_care","pet_care","pet_store","pet_boarding_service"] },
      { name: "Services & Trades",  items: ["tailor","locksmith","plumber","electrician","painter","laundry","art_studio"] },
      { name: "Shops & Retail",     items: ["florist","garden_center","jewelry_store","hardware_store","book_store","shoe_store","cell_phone_store","electronics_store","clothing_store","womens_clothing_store","cosmetics_store","furniture_store","home_goods_store","thrift_store","sporting_goods_store","sportswear_store","toy_store","tea_store","candy_store","liquor_store"] }
    ];

    /* Business types that have an assets/<type>.json file, mapped to the number of
       entries in that file. A non-zero value enables the checkbox and is shown next
       to its label; the rest stay disabled. Keep in sync when data files change. */
    var AVAILABLE = {
      bar: 128,
      coffee_shop: 81,
      hair_salon: 213,
      massage: 27,
      pub: 6
    };
    var allDetails = [];

    var filtersEl = document.getElementById("filters");
    var statusEl  = document.getElementById("status");

    /* ---- helpers ---- */
    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function showStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("is-error", !!isError);
    }

    /* Return {lat,lng} from a POI's location object if both are real numbers, else null. */
    function getLatLng(p) {
      var loc = p && p.location;
      if (!loc) return null;
      var lat = toNum(loc.lat), lng = toNum(loc.lng);
      if (lat === null || lng === null) return null;
      return { lat: lat, lng: lng };
    }
    function toNum(v) {
      if (v === null || v === undefined || v === "") return null;
      var n = Number(v);
      return isFinite(n) ? n : null;
    }

    /* Build the info-bubble HTML for one POI; empty fields are omitted. */
    function buildInfo(poi) {
      var html = '<div class="poi">';
      html += '<h2 class="poi__name">' + esc(poi.title || "Unnamed place") + "</h2>";

      html += buildCarousel(poi);

      var addr = [poi.street, poi.city].filter(Boolean).join(", ");
      if (addr) html += '<div class="poi__row"><i class="bi bi-geo-alt"></i><span>' + esc(addr) + "</span></div>";

      if (poi.phone) {
        var tel = String(poi.phone).replace(/[^+0-9]/g, "");
        html += '<div class="poi__row"><i class="bi bi-telephone"></i><a href="tel:' + esc(tel) + '">'
              + esc(poi.phone) + "</a></div>";
      }

      if (poi.totalScore != null) {
        html += '<div class="poi__rating"><span class="poi__star">★</span> <strong>'
              + esc(String(poi.totalScore)) + "</strong>";
        if (poi.reviewsCount != null) {
          html += ' <span class="poi__reviews">(' + esc(String(poi.reviewsCount)) + " reviews)</span>";
        }
        html += "</div>";
      }

      if (poi.url) {
        html += '<a class="poi__link" href="' + esc(poi.url) + '" target="_blank" rel="noopener">'
              + 'View on Google Maps <i class="bi bi-box-arrow-up-right"></i></a>';
      }

      return html + "</div>";
    }

    /* Build the image carousel HTML for one POI; empty string when no images. */
    function buildCarousel(poi) {
      var imgs = Array.isArray(poi.imageUrls) ? poi.imageUrls.filter(Boolean) : [];
      if (imgs.length === 0) return "";

      var name = esc(poi.title || "");
      var slides = imgs.map(function (src, i) {
        return '<img class="poi__slide" src="' + esc(src) + '" alt="' + name + " photo " + (i + 1)
             + '" loading="lazy" referrerpolicy="no-referrer" />';
      }).join("");

      var html = '<div class="poi__carousel"><div class="poi__track">' + slides + "</div>";
      if (imgs.length > 1) {
        html += '<button type="button" class="poi__nav poi__nav--prev" aria-label="Previous photo"><i class="bi bi-chevron-left"></i></button>'
              + '<button type="button" class="poi__nav poi__nav--next" aria-label="Next photo"><i class="bi bi-chevron-right"></i></button>'
              + '<span class="poi__counter">1 / ' + imgs.length + "</span>";
      }
      return html + "</div>";
    }

    /* Wire prev/next + counter for the carousel currently in the info window. */
    function wireCarousel(root) {
      var track = root.querySelector(".poi__track");
      var slides = root.querySelectorAll(".poi__slide");
      if (!track || slides.length < 2) return;

      var counter = root.querySelector(".poi__counter");
      var prev = root.querySelector(".poi__nav--prev");
      var next = root.querySelector(".poi__nav--next");

      function index() {
        var w = track.clientWidth || 1;
        return Math.round(track.scrollLeft / w);
      }
      function update() {
        if (counter) counter.textContent = (index() + 1) + " / " + slides.length;
      }
      function go(step) {
        var i = Math.max(0, Math.min(slides.length - 1, index() + step));
        track.scrollTo({ left: i * track.clientWidth, behavior: reduceMotion ? "auto" : "smooth" });
      }
      if (prev) prev.addEventListener("click", function () { go(-1); });
      if (next) next.addEventListener("click", function () { go(1); });
      track.addEventListener("scroll", update);
      update();
    }

    /* ---- build the category accordion ---- */
    function prettify(item) {
      var s = item.replace(/_/g, " ");
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function buildMenu() {
      CATEGORIES.forEach(function (cat, idx) {
        var details = document.createElement("details");
        details.className = "cat";

        var available = cat.items.filter(function (item) { return AVAILABLE[item]; }).length;
        var catCount = available ? ' <span class="cat__count">(' + available + ')</span>' : '';

        var summary = document.createElement("summary");
        summary.className = "cat__head";
        summary.innerHTML = '<span class="cat__name">' + esc(cat.name) + catCount + '</span>'
                          + '<i class="bi bi-chevron-down cat__chev"></i>';
        details.appendChild(summary);

        /* keep only one category open at a time */
        details.addEventListener("toggle", function () {
          if (!details.open) return;
          allDetails.forEach(function (d) { if (d !== details) d.open = false; });
        });

        var list = document.createElement("ul");
        list.className = "cat__list";
        cat.items.forEach(function (item) {
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.className = "opt__cb";
          cb.value = item;
          cb.disabled = true;                      /* enabled once the map is ready */
          cb.addEventListener("change", function () { onToggleItem(item, cb); });

          var span = document.createElement("span");
          span.textContent = prettify(item);

          if (AVAILABLE[item]) {
            var count = document.createElement("span");
            count.className = "opt__count";
            count.textContent = "(" + AVAILABLE[item] + ")";
            span.appendChild(count);
          }

          var label = document.createElement("label");
          label.className = "opt";
          label.appendChild(cb);
          label.appendChild(span);

          var li = document.createElement("li");
          li.appendChild(label);
          list.appendChild(li);
        });
        details.appendChild(list);

        allDetails.push(details);
        filtersEl.appendChild(details);
      });
    }

    function enableMenu() {
      var cbs = filtersEl.querySelectorAll(".opt__cb");
      Array.prototype.forEach.call(cbs, function (cb) { cb.disabled = !AVAILABLE[cb.value]; });
    }

    /* ---- hover tooltip showing each checkbox's raw business type ---- */
    function setupTips() {
      var tip = document.createElement("div");
      tip.className = "tip";
      tip.setAttribute("role", "tooltip");
      document.body.appendChild(tip);

      function show(cb) {
        tip.textContent = cb.value;
        tip.classList.add("is-on");
        var r = cb.getBoundingClientRect();
        var tw = tip.offsetWidth, th = tip.offsetHeight;
        var gap = 8, pad = 6;
        var left = Math.max(pad, Math.min(r.left, window.innerWidth - tw - pad));
        var above = r.top - gap - th >= pad;
        tip.classList.toggle("tip--above", above);
        tip.classList.toggle("tip--below", !above);
        tip.style.left = left + "px";
        tip.style.top = (above ? r.top - gap - th : r.bottom + gap) + "px";
        var caret = Math.max(8, Math.min(tw - 8, r.left + r.width / 2 - left));
        tip.style.setProperty("--caret", caret + "px");
      }

      /* Show only after a 2s sustained hover; the whole row is one hover unit,
         so crossing the checkbox/name boundary doesn't restart the timer. */
      var timer = null, currentOpt = null;
      function hide() {
        if (timer) { clearTimeout(timer); timer = null; }
        tip.classList.remove("is-on");
        currentOpt = null;
      }

      filtersEl.addEventListener("mouseover", function (e) {
        var opt = e.target.closest(".opt");
        if (!opt || opt === currentOpt) return;   // outside a row, or still the same one
        if (currentOpt) hide();                    // moved straight onto another row
        currentOpt = opt;
        var cb = opt.querySelector(".opt__cb");
        if (cb && !cb.disabled) {
          timer = setTimeout(function () { timer = null; show(cb); }, 2000);
        }
      });
      filtersEl.addEventListener("mouseout", function (e) {
        // ignore moves that stay within the current row
        if (!currentOpt || (e.relatedTarget && currentOpt.contains(e.relatedTarget))) return;
        hide();
      });
    }

    /* ---- per-item map layers (each "<type>.json" loaded on first request) ---- */
    function onToggleItem(item, cb) {
      if (cb.checked) showLayer(item, cb);
      else hideLayer(item);
    }

    function buildMarkersFor(list) {
      var arr = [];
      list.forEach(function (poi) {
        var pos = getLatLng(poi);
        if (!pos) return;
        var marker = new google.maps.Marker({ position: pos, title: poi.title || "" });
        marker.addListener("click", function () {
          infoWindow.setContent(buildInfo(poi));
          infoWindow.open(map, marker);
        });
        arr.push(marker);
      });
      return arr;
    }

    function showLayer(item, cb) {
      var layer = layers[item];
      if (layer && layer.loaded) {
        layer.markers.forEach(function (m) { m.setMap(map); });
        return;
      }
      if (layer && layer.loading) return;
      layers[item] = { markers: [], loaded: false, loading: true };

      fetch("assets/" + item + ".json")
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (data) {
          var built = buildMarkersFor(Array.isArray(data) ? data : []);
          layers[item] = { markers: built, loaded: true, loading: false };
          if (cb.checked) built.forEach(function (m) { m.setMap(map); });
          showStatus("");
        })
        .catch(function (err) {
          layers[item] = { markers: [], loaded: false, loading: false };
          cb.checked = false;
          showStatus("Couldn't load " + prettify(item) + " (" + err.message + ").", true);
        });
    }

    function hideLayer(item) {
      var layer = layers[item];
      if (layer && layer.markers) layer.markers.forEach(function (m) { m.setMap(null); });
    }

    buildMenu();
    setupTips();

    /* ---- Google Maps callback (global) ---- */
    window.initMap = function () {
      map = new google.maps.Map(document.getElementById("map"), {
        center: GENEVA,
        zoom: DEFAULT_ZOOM,
        clickableIcons: false,
        mapTypeControl: false,
        streetViewControl: false,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", elementType: "labels.icon", stylers: [{ visibility: "off" }] },
          { featureType: "road", elementType: "labels.icon", stylers: [{ visibility: "off" }] }
        ]
      });
      infoWindow = new google.maps.InfoWindow();
      infoWindow.addListener("domready", function () {
        var car = document.querySelector(".poi__carousel");
        if (car) wireCarousel(car);
      });
      mapReady = true;
      enableMenu();
    };

    /* ---- friendly message if the key is missing/invalid ---- */
    window.gm_authFailure = function () {
      showStatus("Google Maps failed to load — check the API key.", true);
    };
  })();
  </script>
