<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Il Colosseo — Page not found</title>
<style>
  :root { --verde:#1f3d2f; --cream:#f2ecdd; --brass:#cba869; --dim:#cfc6ae; }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--verde); color: var(--cream);
    display:grid; place-items:center; text-align:center; padding:2rem; line-height:1.6;
  }
  .wrap { max-width: 30rem; }
  .code { font-family: Georgia, "Times New Roman", serif; font-size: clamp(3.5rem, 12vw, 6rem); font-weight:700; letter-spacing:.05em; color: var(--brass); line-height:1; }
  h1 { font-family: Georgia, "Times New Roman", serif; font-weight:600; font-size:1.5rem; margin:1rem 0 .4rem; }
  p { color: var(--dim); margin-bottom:.4rem; }
  .links { margin-top:1.8rem; display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
  a.btn {
    text-decoration:none; border:1.5px solid var(--brass); color: var(--verde); background: var(--brass);
    padding:.7rem 1.3rem; border-radius:7px; font-weight:600;
  }
  a.btn.ghost { background:transparent; color:var(--cream); border-color:rgba(242,236,221,.5); }
  a.btn:hover { opacity:.92; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page introuvable · Page not found</h1>
    <p>Cette page n'existe pas, mais la table vous attend.</p>
    <p>This page doesn't exist, but a table is waiting for you.</p>
    <div class="links">
      <a class="btn" href="/websites/webs/il-colosseo_restaurant/">Accueil</a>
      <a class="btn ghost" href="/websites/webs/il-colosseo_restaurant/en/">Home (EN)</a>
    </div>
  </div>
</body>
</html>
