      <ellipse cx="48" cy="-16" rx="19" ry="14"/>
      <ellipse cx="-26" cy="42" rx="22" ry="15"/>
      <ellipse cx="52" cy="44" rx="14" ry="11"/>
      <ellipse cx="-64" cy="18" rx="12" ry="9"/>
    </g>
  </g>

