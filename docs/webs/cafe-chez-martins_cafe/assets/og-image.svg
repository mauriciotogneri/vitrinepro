  <text x="560" y="258" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="31" letter-spacing="9" fill="#d49b62">BOULANGERIE · CAFÉ</text>
  <text x="558" y="360" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="86" fill="#f5efdc">Chez Martins</text>
  <rect x="562" y="392" width="288" height="3" fill="#b0c09c"/>
  <text x="560" y="444" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="6" fill="#e2c187">GENÈVE · DEPUIS 1999</text>
