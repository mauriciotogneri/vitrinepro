<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Seamless azulejo (Portuguese tile) motif, brand palette. Signature decorative pattern.
       Gold linework (#C29A3B) on a transparent ground; aubergine (#312B45) + orange (#D2691E) accents.
       Tiles seamlessly: corner arcs join into full rings at vertices; edge diamonds split across edges. -->
  <g fill="none" stroke="#C29A3B" stroke-width="1.7">
    <!-- corner quarter-arcs -> full rings where four tiles meet -->
    <path d="M 22 0 A 22 22 0 0 1 0 22" />
    <path d="M 120 22 A 22 22 0 0 1 98 0" />
    <path d="M 0 98 A 22 22 0 0 1 22 120" />
    <path d="M 98 120 A 22 22 0 0 1 120 98" />
    <!-- central quatrefoil -->
    <circle cx="60" cy="48" r="12" />
    <circle cx="60" cy="72" r="12" />
    <circle cx="48" cy="60" r="12" />
    <circle cx="72" cy="60" r="12" />
    <!-- thin lattice linking centre to corners -->
    <line x1="33" y1="33" x2="49" y2="49" />
    <line x1="87" y1="33" x2="71" y2="49" />
    <line x1="33" y1="87" x2="49" y2="71" />
    <line x1="87" y1="87" x2="71" y2="71" />
  </g>
  <!-- centre accent -->
  <circle cx="60" cy="60" r="4.2" fill="#D2691E" />
  <!-- edge diamonds split across shared edges -->
  <g fill="#312B45">
    <path d="M 60 0 l 6 6 -6 6 -6 -6 z" />
    <path d="M 60 120 l 6 -6 -6 -6 -6 6 z" />
    <path d="M 0 60 l 6 6 6 -6 -6 -6 z" />
    <path d="M 120 60 l -6 6 -6 -6 6 -6 z" />
  </g>
  <!-- corner-vertex dots (quarter dots join into full dots) -->
  <g fill="#C29A3B">
    <circle cx="0" cy="0" r="3" />
    <circle cx="120" cy="0" r="3" />
    <circle cx="0" cy="120" r="3" />
    <circle cx="120" cy="120" r="3" />
  </g>
</svg>
