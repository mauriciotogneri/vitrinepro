<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="utf-8">
    <title>Page introuvable — Chez Marino</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#8dc73f">
    <meta name="color-scheme" content="light">

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&amp;family=Poppins:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .nf {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            gap: 1.25rem;
        }
        .nf img { height: 90px; width: auto; }
        .nf h1 { font-family: var(--font-display); font-weight: 400; color: var(--vino); font-size: clamp(2rem, 5vw, 3rem); }
        .nf p { color: var(--muted); max-width: 42ch; }
    </style>
</head>
<body>
    <div class="nf">
        <img src="assets/logo.png" alt="" width="140" height="93" decoding="async">
        <h1>Perdu, comme une olive dans la sauce.</h1>
        <p>Cette page n&rsquo;existe pas ou plus. Retournez à la table&nbsp;: la carte et nos coordonnées vous attendent.</p>
        <a class="btn btn-primary" href="./">Retour à l&rsquo;accueil</a>
    </div>
</body>
</html>
