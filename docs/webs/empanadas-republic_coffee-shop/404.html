<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page introuvable — Empanadas Republic</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#141414" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caladea:wght@400;700&family=Inter:wght@400;500;600&display=swap" />
  <style>
    :root { --cream: #faf6ef; --ink: #1a1a1a; --muted: #6f6a60; --gold: #c9a24b; --bake: #b5762e; --night: #141414; }
    * { box-sizing: border-box; margin: 0; }
    body { min-height: 100svh; display: grid; place-items: center; padding: 2rem;
      font-family: "Inter", system-ui, sans-serif; color: var(--ink); background: var(--cream);
      background-image: radial-gradient(40rem 26rem at 50% -10%, rgba(201, 162, 75, 0.16), transparent 60%);
      text-align: center; -webkit-font-smoothing: antialiased; }
    .e404 { max-width: 34rem; }
    .e404 svg { width: 120px; height: auto; margin: 0 auto 1.5rem; filter: drop-shadow(0 10px 18px rgba(120, 80, 20, 0.22)); }
    .e404 .code { font-family: "Caladea", Georgia, serif; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; font-size: 0.85rem; color: var(--bake); }
    .e404 h1 { font-family: "Caladea", Georgia, serif; font-weight: 600; font-size: clamp(2rem, 1.4rem + 3vw, 3rem);
      line-height: 1.08; margin: 0.6rem 0 0.9rem; }
    .e404 p { color: var(--muted); font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.8rem; }
    .e404 a { display: inline-flex; align-items: center; gap: 0.5rem; min-height: 48px; padding: 0.7rem 1.6rem;
      font-weight: 600; text-decoration: none; color: var(--night); background: var(--gold);
      border: 1.5px solid var(--gold); border-radius: 999px; transition: background .18s, transform .18s; }
    .e404 a:hover { background: var(--bake); border-color: var(--bake); color: #fff; transform: translateY(-2px); }
    .e404 a:focus-visible { outline: 3px solid var(--bake); outline-offset: 2px; }
  </style>
</head>
<body>
  <main class="e404">
    <svg viewBox="-62 -150 124 232" aria-hidden="true">
      <defs>
        <linearGradient id="bake" x1="0" y1="0" x2="0.2" y2="1">
          <stop offset="0" stop-color="#e0bd6a" /><stop offset="0.55" stop-color="#c9a24b" /><stop offset="1" stop-color="#b5762e" />
        </linearGradient>
      </defs>
      <g stroke="#c9a24b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
        <path d="M -30 -58 q 12 -16 0 -32 q -12 -16 0 -32" />
        <path d="M 2 -68 q 13 -17 0 -34 q -13 -17 0 -34" />
        <path d="M 32 -58 q 12 -16 0 -32 q -12 -16 0 -32" />
      </g>
      <g transform="rotate(-8)">
        <path d="M -44 8 Q 0 40 44 8 Q 0 -30 -44 8 Z" fill="url(#bake)" stroke="#7a4a16" stroke-width="1.6" />
        <path d="M -40 7 Q 0 30 40 7" fill="none" stroke="#7a4a16" stroke-width="1.2" opacity="0.45" />
        <path d="M -39 6 Q 0 -23 39 6" fill="none" stroke="#3a2410" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="0.2 7.4" />
      </g>
    </svg>
    <p class="code">Erreur 404</p>
    <h1>Cette empanada a disparu</h1>
    <p>La page que vous cherchez n'est plus au menu. Revenez à l'accueil pour retrouver nos empanadas argentines, boulevard Carl-Vogt.</p>
    <a href="./">Retour à l'accueil</a>
  </main>
</body>
</html>
