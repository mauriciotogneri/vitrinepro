<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page introuvable — La Casa Del Sandwich</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#db0a14">
  <link rel="icon" href="favicon.ico" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #f6f2ea;
      background: #1a1a1a radial-gradient(900px 500px at 70% -10%, rgba(219,10,20,.18), transparent 60%) no-repeat;
    }
    .wrap { max-width: 30rem; }
    .mask { width: 110px; height: auto; margin: 0 auto 1.4rem; }
    .code { font-size: 3.4rem; font-weight: 800; color: #e0a82e; letter-spacing: .04em; line-height: 1; }
    h1 { font-size: 1.5rem; margin: .8rem 0 .6rem; color: #f4ead0; }
    p { color: #a59c8e; margin-bottom: 1.6rem; }
    a.home {
      display: inline-block; background: #db0a14; color: #fff; text-decoration: none; font-weight: 700;
      padding: .85rem 1.6rem; border-radius: 999px;
    }
    a.home:hover { background: #f5333d; }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="mask" src="assets/mascot.png" alt="" width="120" height="120" decoding="async">
    <p class="code">404</p>
    <h1>Cette page a filé avec le butin</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournons à la maison.</p>
    <a class="home" href="index.html">Retour à l'accueil</a>
  </main>
</body>
</html>
