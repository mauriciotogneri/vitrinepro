<!DOCTYPE html>
<html lang="fr-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page introuvable — GYROS</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#333333" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <style>
      .e404 {
        min-height: 80vh;
        min-height: 80dvh;
        display: grid;
        place-content: center;
        text-align: center;
        gap: 1.1rem;
        padding: 3rem var(--gut);
      }
      .e404 .code {
        font: 700 clamp(4rem, 14vw, 8rem) / 0.9 var(--display);
        letter-spacing: -0.03em;
        color: var(--azure);
      }
      .e404 h1 {
        font: 700 clamp(1.5rem, 1rem + 2vw, 2.2rem) / 1.1 var(--display);
        color: var(--ink);
      }
      .e404 p {
        color: var(--muted);
        max-width: 44ch;
        margin-inline: auto;
      }
      .e404 .btns {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        justify-content: center;
        margin-top: 0.6rem;
      }
    </style>
  </head>
  <body>
    <main class="e404">
      <p class="code">404</p>
      <h1>Cette page a filé.</h1>
      <p>
        La page que vous cherchez n'existe pas (ou plus). Le gyros, lui, est
        toujours là — revenez à l'accueil ou jetez un œil à la carte.
      </p>
      <div class="btns">
        <a class="btn btn-primary" href="./">Retour à l'accueil</a>
        <a class="btn btn-ghost" href="./#carte">Voir la carte</a>
      </div>
    </main>
  </body>
</html>
