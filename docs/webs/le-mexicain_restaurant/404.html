<!DOCTYPE html>
<html lang="fr-CH">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page introuvable — Le Mexicain</title>
    <meta name="theme-color" content="#ae431e">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            min-height: 100svh;
            display: grid;
            place-content: center;
            gap: 1.1rem;
            justify-items: center;
            text-align: center;
            padding: 2rem;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            color: #fdffd0;
            background:
                radial-gradient(120% 80% at 85% -10%, rgba(218, 165, 32, .28), transparent 60%),
                radial-gradient(90% 70% at 0% 5%, rgba(208, 98, 36, .5), transparent 55%),
                #ae431e;
        }

        img {
            width: 76px;
            height: 76px;
            border-radius: 0;
            box-shadow: 0 10px 30px rgba(20, 7, 2, .3);
        }

        h1 {
            font-family: "Anton", Impact, sans-serif;
            font-size: clamp(2.8rem, 9vw, 4.2rem);
            font-weight: 400;
            letter-spacing: .02em;
            text-transform: uppercase;
            color: #fdffd0;
        }

        p {
            color: #fdffd0;
            max-width: 34rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: .7rem;
            justify-content: center;
            margin-top: .6rem;
        }

        a.btn {
            display: inline-flex;
            align-items: center;
            min-height: 48px;
            padding: .8em 1.5em;
            border-radius: 0;
            background: #fdffd0;
            color: #ae431e;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            text-decoration: none;
            border: 2px solid #fdffd0;
        }

        a.btn.ghost {
            background: transparent;
            color: #fdffd0;
            border-color: #fdffd0;
        }

        a:focus-visible {
            outline: 3px solid #daa520;
            outline-offset: 3px;
        }
    </style>
</head>

<body>
    <img src="assets/favicon-512.png" alt="Le Mexicain">
    <h1>404</h1>
    <p>
        <strong>Cette page n’existe pas.</strong> Retournons à table.<br>
        <span lang="en">This page doesn’t exist. Let’s head back to the table.</span>
    </p>
    <div class="row">
        <a class="btn" href="https://mauriciotogneri.github.io/vitrinepro/webs/le-mexicain_restaurant/">Accueil</a>
        <a class="btn ghost" href="https://mauriciotogneri.github.io/vitrinepro/webs/le-mexicain_restaurant/en/"
            lang="en">English home</a>
    </div>
</body>

</html>
