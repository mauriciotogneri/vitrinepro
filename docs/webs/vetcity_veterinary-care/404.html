<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page introuvable — VetCity</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#18a48c" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="error-page">
    <div class="inner">
      <img src="assets/favicon-512.png" width="76" height="76" alt="Logo VetCity" />
      <p class="code">404</p>
      <h1>Cette page s’est échappée.</h1>
      <p>La page que vous cherchez n’existe pas ou a été déplacée. Revenons sur nos pattes.</p>
      <div class="pulse-mini" aria-hidden="true">
        <svg viewBox="0 0 300 30" preserveAspectRatio="none" role="presentation">
          <path class="pulse-trace" d="M0 15 H110 l8 0 l6 -11 l7 22 l6 -15 l5 4 H300" />
          <path class="pulse-run" pathLength="100" d="M0 15 H110 l8 0 l6 -11 l7 22 l6 -15 l5 4 H300" />
        </svg>
      </div>
      <a class="btn btn-primary" href="./">Retour à l’accueil</a>
    </div>
  </main>
</body>
</html>
