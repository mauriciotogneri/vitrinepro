<!DOCTYPE html>
<html lang="fr-CH">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page introuvable · Fleur d'Oranger</title>
    <meta name="theme-color" content="#134E45">
    <style>
        :root {
            --ivory: #FBF6EE;
            --teal: #134E45;
            --amber: #E0954E;
            --verm: #C8492A;
            --ink: #2B2521;
            --muted: #6E6357;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 2rem;
            font-family: "Mulish", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(50vw 40vh at 80% 0%, rgba(224, 149, 78, .18), transparent 60%),
                radial-gradient(50vw 40vh at 10% 100%, rgba(31, 162, 148, .12), transparent 60%),
                var(--ivory);
        }

        .wrap {
            max-width: 32rem;
        }

        svg.blossom {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            overflow: visible;
        }

        h1 {
            font-family: "Marcellus", Georgia, serif;
            font-weight: 400;
            font-size: clamp(2.4rem, 1.5rem + 4vw, 3.6rem);
            margin: .2rem 0 .4rem;
            color: var(--teal);
        }

        .code {
            font-family: "Marcellus", Georgia, serif;
            font-size: 1rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--verm);
        }

        p {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: .6rem 0 1.6rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: .8rem;
            justify-content: center;
        }

        a.btn {
            display: inline-flex;
            align-items: center;
            min-height: 48px;
            padding: .75rem 1.4rem;
            border-radius: 999px;
            font-weight: 800;
            text-decoration: none;
        }

        .p {
            background: var(--verm);
            color: #fff;
        }

        .s {
            background: transparent;
            color: var(--teal);
            border: 1px solid #DCCDB4;
        }

        a:focus-visible {
            outline: 3px solid #1FA294;
            outline-offset: 3px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <svg class="blossom" viewBox="0 0 48 48" aria-hidden="true">
            <g fill="#E0954E">
                <ellipse cx="24" cy="9" rx="6" ry="12" />
                <ellipse cx="24" cy="9" rx="6" ry="12" transform="rotate(72 24 24)" />
                <ellipse cx="24" cy="9" rx="6" ry="12" transform="rotate(144 24 24)" />
                <ellipse cx="24" cy="9" rx="6" ry="12" transform="rotate(216 24 24)" />
                <ellipse cx="24" cy="9" rx="6" ry="12" transform="rotate(288 24 24)" />
            </g>
            <circle cx="24" cy="24" r="5.5" fill="#134E45" />
            <circle cx="24" cy="24" r="2" fill="#FBF6EE" />
        </svg>
        <p class="code">Erreur 404</p>
        <h1>Page introuvable</h1>
        <p>Cette page n'existe pas ou a été déplacée. Comme nos plus belles pièces, elle est peut-être déjà
            partie.<br><span lang="en">This page could not be found.</span></p>
        <div class="links">
            <a class="btn p"
                href="https://mauriciotogneri.github.io/vitrinepro/webs/fleur-d-oranger_second-hand-shop/">Retour à
                l'accueil</a>
            <a class="btn s"
                href="https://mauriciotogneri.github.io/vitrinepro/webs/fleur-d-oranger_second-hand-shop/en/"
                lang="en">English home</a>
        </div>
    </div>
</body>

</html>
