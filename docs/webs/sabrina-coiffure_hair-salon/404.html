      .err {
        min-height: 100svh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem var(--gutter);
      }
      .err .seal {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.6rem;
      }
      .err h1 {
        font-size: clamp(2.2rem, 1.6rem + 3vw, 3.4rem);
        margin-bottom: 0.8rem;
      }
      .err p {
        color: var(--on-deep-muted);
        max-width: 34rem;
        margin: 0 auto 2rem;
        font-size: 1.1rem;
      }
    </style>

  <body class="band-deep">
    <main class="err">
      <div>
        <svg class="seal" viewBox="0 0 100 100" aria-hidden="true">
          <rect width="100" height="100" rx="24" fill="#5e7358" />
          <circle cx="50" cy="50" r="37" fill="none" stroke="#faf5ee" stroke-opacity="0.4" stroke-width="1.6" />
          <path d="M64 33 C47 28 37 44 50 53 C64 62 57 75 41 71" fill="none" stroke="#faf5ee" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="64" cy="33" r="4.6" fill="#b5664f" />
        </svg>
        <h1>Cette page a filé.</h1>
        <p>
          La page que vous cherchez n'existe pas ou a été déplacée. Retrouvez le salon sur la page d'accueil.
        </p>
        <a class="btn btn-primary" href="https://mauriciotogneri.github.io/vitrinepro/webs/sabrina-coiffure_hair-salon/">
