<!DOCTYPE html>
<html lang="fr-CH" class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      document.documentElement.className = document.documentElement.className.replace("no-js", "js");
    </script>
    <title>Page introuvable — Coiffure Illusion</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#4a2e45" />

    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600&family=Mulish:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <style>
      .nf {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        text-align: center;
      }
      .nf .hero-inner {
        gap: 0;
      }
      .nf-code {
        font-family: var(--f-display);
        font-style: italic;
        font-weight: 600;
        font-size: clamp(4rem, 18vw, 8rem);
        line-height: 1;
        color: var(--gold);
      }
    </style>
  </head>

  <body id="top">
    <main class="hero nf">
      <svg class="hero-mirror" viewBox="0 0 300 400" aria-hidden="true" focusable="false">
        <g fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="150" cy="200" rx="130" ry="185" />
          <ellipse cx="150" cy="200" rx="112" ry="163" />
        </g>
      </svg>
      <div class="wrap hero-inner">
        <p class="eyebrow">Erreur 404</p>
        <span class="nf-code">Oups…</span>
        <p class="hero-lede" style="margin-inline: auto">
          Cette page n'existe pas, ou a été déplacée. Retrouvez le salon depuis
          l'accueil.
        </p>
        <div class="hero-cta">
          <a
            class="btn btn--primary"
            href="https://mauriciotogneri.github.io/vitrinepro/webs/coiffure-illusion_hair-salon/"
            >Retour à l'accueil</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
