<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#730000">
  <title>Page introuvable — Café Restaurant de la Radio</title>
  <style>
    :root { --cream:#fcfbf0; --oxblood:#730000; --garnet:#8c0a13; --ink:#2a1a1a; --dust:#8a7f72; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 2rem;
      background: var(--cream); color: var(--ink);
      font-family: ui-rounded, "Segoe UI", Roboto, sans-serif; text-align: center; line-height: 1.6;
    }
    main { max-width: 30rem; }
    .mark { width: 84px; height: 84px; margin: 0 auto 1.5rem; color: var(--oxblood); }
    h1 { font-size: clamp(2.6rem, 9vw, 4rem); margin: 0 0 .5rem; color: var(--oxblood); }
    p { margin: .25rem 0; color: var(--dust); }
    .home {
      display: inline-block; margin-top: 1.6rem; padding: .85rem 1.8rem;
      background: var(--oxblood); color: var(--cream); text-decoration: none;
      border-radius: 999px; font-weight: 700; transition: background .16s ease, transform .16s ease;
    }
    .home:hover { background: var(--garnet); transform: translateY(-2px); }
  </style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 120 120" aria-hidden="true" focusable="false">
      <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="60" cy="60" r="44" fill="none" stroke="currentColor" stroke-width="1" opacity=".5"/>
      <line x1="60" y1="60" x2="42" y2="29" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="4.5" fill="currentColor"/>
      <text x="60" y="87" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15">73</text>
    </svg>
    <h1>404</h1>
    <p><strong>Cette page n'existe pas.</strong></p>
    <p>Retournons à la brasserie.</p>
    <a class="home" href="./">Retour à l'accueil</a>
  </main>
</body>
</html>
