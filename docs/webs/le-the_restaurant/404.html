<!DOCTYPE html>

    :root { color-scheme: dark; }

      min-height: 100vh; display: grid; place-items: center; text-align: center;

    }
    .num { color: #e08a5f; }
    p { color: #c6b394; max-width: 30rem; margin: 1rem auto 0; }
    .home {
      display: inline-block; margin-top: 1.9rem; padding: .8rem 1.6rem;
      background: #9c3b2c; color: #f4ecdd; text-decoration: none;
      border-radius: 6px; font-weight: 700; letter-spacing: .03em;
    }
    .home:hover { background: #7f2d20; }
    .home:focus-visible { outline: 3px solid #e08a5f; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="https://vndly.github.io/websites/webs/le-the_restaurant/assets/favicon-512.png" width="78" height="78" alt="Le Thé">
